<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEX – KI Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; justify-content: center; }
    #root { width: 100%; max-width: 430px; min-height: 100vh; display: flex; flex-direction: column; }
    button { font-family: 'DM Sans', sans-serif; cursor: pointer; }
    input, textarea { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }
    @keyframes pulse { 0%, 80%, 100% { transform: scale(0); opacity: .3; } 40% { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .bubble-in { animation: fadeIn 0.25s ease forwards; }

    /* SCREENS */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* SPLASH */
    .splash-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; position: relative; overflow: hidden; }
    .glow { position: absolute; width: 360px; height: 360px; border-radius: 50%; background: radial-gradient(circle, rgba(232,39,42,0.16) 0%, transparent 70%); top: 38%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; }
    .apex-huge { font-family: 'Bebas Neue', sans-serif; font-size: 96px; letter-spacing: 14px; color: #E8272A; line-height: 1; text-shadow: 0 0 60px rgba(232,39,42,0.45); }
    .ki-label { font-size: 11px; letter-spacing: 8px; color: #444; margin-top: 2px; }
    .tagline1 { color: #bbb; font-size: 16px; font-weight: 300; margin-top: 28px; text-align: center; }
    .tagline2 { color: #E8272A; font-size: 11px; margin-top: 8px; text-align: center; letter-spacing: 1px; opacity: 0.8; }
    .start-btn { margin-top: 52px; background: #E8272A; border: none; border-radius: 16px; color: #fff; padding: 18px 52px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; transition: opacity 0.2s; }
    .start-btn:hover { opacity: 0.85; }

    /* TOP BAR */
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 5px; color: #E8272A; }
    .top-bar-name { font-size: 11px; color: #666; letter-spacing: 1px; }
    .back-btn { background: none; border: none; color: #666; font-size: 20px; padding: 0 4px; transition: color 0.2s; line-height: 1; }
    .back-btn:hover { color: #fff; }
    .dots { display: flex; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #222; transition: all 0.3s; }
    .dot.active { background: #E8272A; transform: scale(1.3); }
    .dot.done { background: #E8272A; }

    /* BODY */
    .body { flex: 1; padding: 24px 20px 20px; overflow-y: auto; }
    .question { font-size: 23px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
    .desc-subtitle { font-size: 13px; color: #666; margin-bottom: 16px; line-height: 1.5; }

    /* CARDS */
    .list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .choice-card { display: flex; align-items: center; gap: 16px; border: 1px solid #222; border-radius: 14px; padding: 16px 18px; background: rgba(255,255,255,0.03); transition: all 0.2s; text-align: left; width: 100%; }
    .choice-card:hover { border-color: #E8272A; background: rgba(232,39,42,0.07); }
    .choice-card .icon { font-size: 22px; flex-shrink: 0; }
    .choice-card .label { font-size: 15px; font-weight: 600; color: #fff; }
    .choice-card .sub { font-size: 12px; color: #666; margin-top: 2px; }

    .type-card { border: 1px solid #222; border-radius: 18px; padding: 22px 20px; background: rgba(255,255,255,0.03); transition: all 0.2s; text-align: left; position: relative; width: 100%; }
    .type-card:hover { border-color: #E8272A; background: rgba(232,39,42,0.07); }
    .type-card .t-icon { font-size: 32px; margin-bottom: 8px; }
    .type-card .t-label { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: #fff; }
    .type-card .t-desc { font-size: 13px; color: #888; margin-top: 5px; line-height: 1.5; }
    .type-card .arrow { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #E8272A; }

    .ma-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
    .ma-card { border: 1px solid #222; border-radius: 16px; padding: 20px 14px; background: rgba(255,255,255,0.03); transition: all 0.2s; text-align: center; width: 100%; }
    .ma-card:hover { border-color: #E8272A; background: rgba(232,39,42,0.09); }
    .ma-card .ma-icon { font-size: 28px; margin-bottom: 8px; }
    .ma-card .ma-label { font-size: 15px; font-weight: 700; }
    .ma-card .ma-desc { font-size: 11px; color: #666; margin-top: 4px; }

    /* HINTS */
    .hint-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .hint-chip { background: rgba(232,39,42,0.08); border: 1px solid rgba(232,39,42,0.2); border-radius: 20px; color: #E8272A; padding: 5px 12px; font-size: 11px; }

    /* TEXTAREA */
    .desc-textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: #e8e8e8; padding: 16px; font-size: 14px; outline: none; resize: none; line-height: 1.6; margin-bottom: 16px; }
    .desc-textarea:focus { border-color: rgba(232,39,42,0.4); }
    .generate-btn { width: 100%; background: #E8272A; border: none; border-radius: 16px; color: #fff; padding: 18px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; transition: opacity 0.2s; }
    .generate-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .generate-btn:not(:disabled):hover { opacity: 0.85; }

    /* INPUT ROW */
    .input-row { display: flex; gap: 10px; padding: 10px 16px 16px; border-top: 1px solid rgba(255,255,255,0.06); }
    .chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: #fff; padding: 13px 16px; font-size: 14px; outline: none; }
    .chat-input:focus { border-color: rgba(232,39,42,0.4); }
    .send-btn { background: #E8272A; border: none; border-radius: 14px; color: #fff; width: 48px; height: 48px; font-size: 16px; flex-shrink: 0; transition: opacity 0.2s; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* CHAT */
    .chat-top { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(8,8,8,0.97); position: sticky; top: 0; z-index: 10; }
    .chat-top-sub { font-size: 10px; color: #E8272A; letter-spacing: 1px; margin-top: 1px; font-weight: 600; }
    .p-name { font-size: 13px; font-weight: 600; }
    .p-level { font-size: 11px; color: #666; margin-top: 1px; }
    .chat-area { flex: 1; overflow-y: auto; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 12px; }

    .bubble { padding: 14px 16px; max-width: 92%; border-radius: 18px 18px 18px 4px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); align-self: flex-start; }
    .bubble.user { background: linear-gradient(135deg,#E8272A,#b01e20); border: none; border-radius: 18px 18px 4px 18px; align-self: flex-end; }
    .apex-lbl { font-size: 9px; font-weight: 700; color: #E8272A; letter-spacing: 2px; margin-bottom: 8px; }
    .bubble-txt { font-size: 14px; color: #e8e8e8; line-height: 1.65; }

    /* MARKDOWN */
    .md-h2 { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: #E8272A; margin-top: 18px; margin-bottom: 6px; border-bottom: 1px solid rgba(232,39,42,0.25); padding-bottom: 4px; }
    .md-h3 { font-size: 14px; font-weight: 700; color: #fff; margin-top: 13px; margin-bottom: 4px; }
    .md-hr { border-top: 1px solid rgba(255,255,255,0.08); margin: 13px 0; }
    .md-bullet { display: flex; gap: 8px; margin-bottom: 3px; }
    .md-bullet-dot { color: #E8272A; flex-shrink: 0; margin-top: 1px; }
    .md-bullet-text { font-size: 13px; color: #d0d0d0; line-height: 1.6; }
    .md-p { font-size: 13px; color: #d0d0d0; line-height: 1.7; margin-bottom: 2px; }
    .md-bold { color: #fff; font-weight: 700; }
    .md-gap { height: 5px; }

    /* TYPING */
    .typing-row { display: flex; gap: 5px; align-items: center; height: 20px; }
    .tdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #E8272A; animation: pulse 1.2s infinite ease-in-out both; }

    /* QUICK PROMPTS */
    .q-row { display: flex; gap: 8px; overflow-x: auto; padding: 8px 16px; scrollbar-width: none; }
    .q-row::-webkit-scrollbar { display: none; }
    .q-btn { background: rgba(232,39,42,0.08); border: 1px solid rgba(232,39,42,0.2); border-radius: 20px; color: #E8272A; padding: 8px 14px; font-size: 12px; white-space: nowrap; flex-shrink: 0; transition: background 0.2s; }
    .q-btn:hover { background: rgba(232,39,42,0.18); }
  </style>
</head>
<body>
<div id="root">

  <!-- SPLASH -->
  <div class="screen active" id="screen-splash">
    <div class="splash-wrap">
      <div class="glow"></div>
      <div class="apex-huge">APEX</div>
      <div class="ki-label">KI TRAINER</div>
      <div class="tagline1">Trainiert von den Besten der Welt.</div>
      <div class="tagline2">Phil Daru · Mike Dolce · Nick Curson · Bo Sandoval</div>
      <button class="start-btn" onclick="showOnboarding()">JETZT STARTEN</button>
    </div>
  </div>

  <!-- ONBOARDING -->
  <div class="screen" id="screen-onboarding">
    <div class="top-bar">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="logo">APEX</div>
      <div class="dots" id="dots"></div>
    </div>
    <div class="body" id="onboarding-body"></div>
  </div>

  <!-- TRAIN TYPE -->
  <div class="screen" id="screen-traintype">
    <div class="top-bar">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="logo">APEX</div>
      <div class="top-bar-name" id="tt-name"></div>
    </div>
    <div class="body">
      <div class="question">Welches Programm?</div>
      <div class="list" id="traintype-list"></div>
    </div>
  </div>

  <!-- MARTIAL ART -->
  <div class="screen" id="screen-martialart">
    <div class="top-bar">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="logo">APEX</div>
      <div class="top-bar-name" id="ma-top-name"></div>
    </div>
    <div class="body">
      <div class="question">Deine Kampfsportart?</div>
      <div class="ma-grid" id="martial-art-grid"></div>
    </div>
  </div>

  <!-- DESCRIBE -->
  <div class="screen" id="screen-describe">
    <div class="top-bar">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="logo">APEX</div>
      <div class="top-bar-name" id="desc-top-name"></div>
    </div>
    <div class="body">
      <div class="question" id="desc-title"></div>
      <div class="desc-subtitle">Beschreibe genau was du willst – APEX erstellt dir dann deinen perfekten Plan.</div>
      <div class="hint-row" id="desc-hints"></div>
      <textarea class="desc-textarea" id="desc-textarea" rows="6" oninput="checkDescBtn()"></textarea>
      <button class="generate-btn" id="generate-btn" onclick="startChat()" disabled>⚡ PLAN ERSTELLEN</button>
    </div>
  </div>

  <!-- CHAT -->
  <div class="screen" id="screen-chat" style="display:none; flex-direction:column;">
    <div class="chat-top">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="back-btn" onclick="goBack()" style="color:#555">←</button>
        <div>
          <div class="logo">APEX</div>
          <div class="chat-top-sub" id="chat-top-sub"></div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="p-name" id="chat-p-name"></div>
        <div class="p-level" id="chat-p-level"></div>
      </div>
    </div>
    <div class="chat-area" id="chat-area"></div>
    <div class="q-row" id="q-row"></div>
    <div class="input-row">
      <input class="chat-input" id="chat-input" placeholder="Frag deinen Coach..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>▶</button>
    </div>
  </div>

</div>

<script>
const GROQ_KEY = "DEIN_GROQ_KEY_HIER"; // wird durch env variable ersetzt

const SYSTEM_PROMPT = `Du bist APEX – der fortschrittlichste MMA KI-Trainer der Welt.

Du hast die Trainingsmethoden der absoluten Elite-Coaches der Welt studiert und verinnerlicht:

KRAFT & KONDITION EXPERTEN:
- Phil Daru (Daru Strong): Explosivkraft, Athletic Performance, periodisiertes Strength Training für MMA Kämpfer. Bekannt für seine "Fighter Prep" Methode, Compensatory Acceleration Training (CAT), und seine Arbeit mit UFC Champions wie Dustin Poirier.
- Mike Dolce (The Dolce Diet): Gewichtsmanagement, Ernährungsoptimierung, Recovery-Protokolle, natürliche Lebensmittel für maximale Performance.
- Bo Nickal / Bo Sandoval: Athletik-Training, Wrestling-basierte Kondition, Explosive Power.
- Nick Curson (Speed of Sport): Speed-Training, reaktive Kraft, athletische Bewegungsmuster, neuromuskuläres Training.

MMA TECHNIK LEGENDEN:
- Khabib Nurmagomedov: Sambo, Grappling-Kontrolle, Cage Wrestling
- Jon Jones: Unorthodoxe Angles, Reichweite, Ellenbogen-Technik
- Israel Adesanya: Kickbox-Rhythmus, Distanzmanagement, Counter-Striking
- GSP: Wrestling-to-Striking, Double-Leg Takedowns, Disziplin
- Demetrious Johnson: Transition Speed, Submission-Hunting
- Amanda Nunes: Power-Striking, BJJ-Finishing

DEINE METHODEN:
- Kombiniere die BESTEN Elemente aller Coaches für den spezifischen Kämpfer
- Nutze periodisiertes Training (Makro/Mikro-Zyklen)
- Sei KONKRET: echte Übungen, echte Sets/Reps, echte Zeiten, echte Progressionen
- Erkläre WARUM du bestimmte Methoden verwendest

FORMATIERUNG – SEHR WICHTIG:
- Strukturiere Antworten IMMER mit ## für Hauptbereiche, ### für Unterbereiche
- Nutze **Fettschrift** für wichtige Begriffe und Zahlen
- Nutze Aufzählungen mit - für Listen
- Trenne Wochentage mit ### Montag, ### Dienstag etc.
- Schreibe Pläne VOLLSTÄNDIG aus – alle Tage, nie mittendrin aufhören
- Nutze --- als Trennlinie zwischen großen Abschnitten

WICHTIG: Antworte IMMER auf Deutsch. Direkt, motivierend, präzise wie ein Profi-Coach.`;

const MARTIAL_ARTS = [
  { id: "mma", label: "MMA", icon: "🥊", desc: "Mixed Martial Arts" },
  { id: "boxing", label: "Boxen", icon: "👊", desc: "Klassisches Boxen" },
  { id: "muaythai", label: "Muay Thai", icon: "🦵", desc: "8-Limb Kunst" },
  { id: "bjj", label: "BJJ", icon: "🥋", desc: "Brazilian Jiu-Jitsu" },
  { id: "wrestling", label: "Wrestling", icon: "🤼", desc: "Takedowns & Control" },
  { id: "kickboxing", label: "Kickboxen", icon: "⚡", desc: "Kickbox Sport" },
  { id: "judo", label: "Judo", icon: "🎌", desc: "Würfe & Hebel" },
  { id: "sambo", label: "Sambo", icon: "🔥", desc: "Russischer Kampfsport" },
];

const TRAIN_TYPES = [
  { id: "strength", label: "Kraft & Kondition", icon: "💪", desc: "Maximale Stärke, Explosivität & Ausdauer" },
  { id: "technik", label: "Technik", icon: "🥋", desc: "Kampfsport-Technik auf Profi-Niveau" },
  { id: "ausdauer", label: "Ausdauer", icon: "🫁", desc: "Cardio, Gaswork & mentale Härte" },
];

const DESCRIBE_PROMPTS = {
  strength: { title: "Beschreibe dein Ziel", placeholder: "z.B. Ich will in 8 Wochen meinen Kampf vorbereiten, 3x pro Woche trainieren, hauptsächlich Explosivkraft...", hints: ["Wie viele Wochen hast du?", "Wie oft pro Woche?", "Welches Equipment?", "Aktuelles Level?"] },
  technik: { title: "Was willst du verbessern?", placeholder: "z.B. Ich will meinen Jab-Cross-Hook schärfen und meine Distanz besser kontrollieren...", hints: ["Welche Technik fehlt dir?", "Was ist deine Schwäche?", "Wie viel Zeit pro Training?"] },
  ausdauer: { title: "Beschreibe dein Konditions-Ziel", placeholder: "z.B. Ich will für einen 5-Runden-Hauptkampf vorbereiten. Ich werde nach Runde 2 immer müde...", hints: ["Wie viele Runden kämpfst du?", "Was ist dein Schwachpunkt?", "Wie oft pro Woche?"] },
};

const ONBOARDING = [
  { question: "Wie heißt du, Kämpfer?", key: "name", type: "text", placeholder: "Dein Name..." },
  { question: "Dein Erfahrungslevel?", key: "level", type: "choice", options: [{ label: "Anfänger", sub: "0 – 1 Jahr", icon: "🌱" }, { label: "Fortgeschritten", sub: "1 – 3 Jahre", icon: "⚔️" }, { label: "Erfahren", sub: "3 – 5 Jahre", icon: "🏆" }, { label: "Profi / Semi-Pro", sub: "Wettkampf-Niveau", icon: "👑" }] },
  { question: "Deine Gewichtsklasse?", key: "weight", type: "choice", options: [{ label: "Strohgewicht", sub: "bis 52 kg", icon: "🪶" }, { label: "Federgewicht", sub: "bis 66 kg", icon: "🐦" }, { label: "Leichtgewicht", sub: "bis 70 kg", icon: "⚡" }, { label: "Weltergewicht", sub: "bis 77 kg", icon: "🔥" }, { label: "Mittelgewicht", sub: "bis 84 kg", icon: "💥" }, { label: "Schwergewicht", sub: "84 kg+", icon: "🦁" }] },
  { question: "Dein Hauptziel?", key: "goal", type: "choice", options: [{ label: "Fitness & Form", sub: "Körper formen & fit werden", icon: "💪" }, { label: "Technik verbessern", sub: "Skills auf nächstes Level", icon: "🎯" }, { label: "Wettkampf", sub: "Turnier oder Profi", icon: "🏅" }, { label: "Profi werden", sub: "Vollzeit-Karriere", icon: "⭐" }] },
];

let state = { screen: "splash", step: 0, profile: {}, trainType: null, martialArt: null, messages: [], history: [], loading: false };

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = ''; });
  const el = document.getElementById('screen-' + name);
  if (el) { el.classList.add('active'); el.style.display = 'flex'; }
  state.screen = name;
}

function showOnboarding() {
  state.step = 0;
  renderOnboarding();
  showScreen('onboarding');
}

function renderOnboarding() {
  const cs = ONBOARDING[state.step];
  const body = document.getElementById('onboarding-body');
  const dots = document.getElementById('dots');
  dots.innerHTML = ONBOARDING.map((_, i) => `<div class="dot ${i < state.step ? 'done' : ''} ${i === state.step ? 'active' : ''}"></div>`).join('');

  if (cs.type === 'text') {
    body.innerHTML = `<div class="question">${cs.question}</div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <input autofocus class="chat-input" id="ob-input" placeholder="${cs.placeholder}" onkeydown="if(event.key==='Enter'){const v=document.getElementById('ob-input').value.trim();if(v)answerOnboarding(v);}" style="flex:1;" />
        <button class="send-btn" onclick="const v=document.getElementById('ob-input').value.trim();if(v)answerOnboarding(v);">▶</button>
      </div>`;
  } else {
    body.innerHTML = `<div class="question">${cs.question}</div><div class="list">${cs.options.map(o => `<button class="choice-card" onclick="answerOnboarding('${o.label}')"><span class="icon">${o.icon}</span><div><div class="label">${o.label}</div><div class="sub">${o.sub}</div></div></button>`).join('')}</div>`;
  }
}

function answerOnboarding(value) {
  state.profile[ONBOARDING[state.step].key] = value;
  if (state.step < ONBOARDING.length - 1) { state.step++; renderOnboarding(); }
  else { renderTrainType(); showScreen('traintype'); }
}

function renderTrainType() {
  document.getElementById('tt-name').textContent = state.profile.name || '';
  document.getElementById('traintype-list').innerHTML = TRAIN_TYPES.map(t =>
    `<button class="type-card" onclick="selectTrainType('${t.id}','${t.label}')">
      <div class="t-icon">${t.icon}</div>
      <div class="t-label">${t.label}</div>
      <div class="t-desc">${t.desc}</div>
      <div class="arrow">→</div>
    </button>`).join('');
}

function selectTrainType(id, label) {
  state.trainType = { id, label };
  state.martialArt = null;
  if (id === 'technik') { renderMartialArt(); showScreen('martialart'); }
  else { renderDescribe(); showScreen('describe'); }
}

function renderMartialArt() {
  document.getElementById('ma-top-name').textContent = state.trainType?.label || '';
  document.getElementById('martial-art-grid').innerHTML = MARTIAL_ARTS.map(ma =>
    `<button class="ma-card" onclick="selectMartialArt('${ma.id}','${ma.label}')">
      <div class="ma-icon">${ma.icon}</div>
      <div class="ma-label">${ma.label}</div>
      <div class="ma-desc">${ma.desc}</div>
    </button>`).join('');
}

function selectMartialArt(id, label) {
  state.martialArt = { id, label };
  renderDescribe();
  showScreen('describe');
}

function renderDescribe() {
  const dp = DESCRIBE_PROMPTS[state.trainType?.id] || DESCRIBE_PROMPTS.strength;
  document.getElementById('desc-top-name').textContent = state.martialArt ? state.martialArt.label : state.trainType?.label || '';
  document.getElementById('desc-title').textContent = dp.title;
  document.getElementById('desc-hints').innerHTML = dp.hints.map(h => `<div class="hint-chip">${h}</div>`).join('');
  const ta = document.getElementById('desc-textarea');
  ta.value = '';
  ta.placeholder = dp.placeholder;
  document.getElementById('generate-btn').disabled = true;
}

function checkDescBtn() {
  document.getElementById('generate-btn').disabled = !document.getElementById('desc-textarea').value.trim();
}

function goBack() {
  const s = state.screen;
  if (s === 'onboarding') { if (state.step > 0) { state.step--; renderOnboarding(); } else showScreen('splash'); }
  else if (s === 'traintype') { state.step = ONBOARDING.length - 1; renderOnboarding(); showScreen('onboarding'); }
  else if (s === 'martialart') showScreen('traintype');
  else if (s === 'describe') { if (state.martialArt) showScreen('martialart'); else showScreen('traintype'); }
  else if (s === 'chat') { state.messages = []; state.history = []; renderDescribe(); showScreen('describe'); }
}

async function startChat() {
  const desc = document.getElementById('desc-textarea').value.trim();
  if (!desc) return;
  showScreen('chat');
  document.getElementById('chat-top-sub').textContent = state.trainType?.label + (state.martialArt ? ' · ' + state.martialArt.label : '');
  document.getElementById('chat-p-name').textContent = state.profile.name || '';
  document.getElementById('chat-p-level').textContent = state.profile.level || '';
  renderQuickPrompts();

  const contextMsg = `Mein Kämpfer-Profil:\nName: ${state.profile.name}\nLevel: ${state.profile.level}\nGewichtsklasse: ${state.profile.weight}\nZiel: ${state.profile.goal}\nTrainingstyp: ${state.trainType?.label}${state.martialArt ? '\nKampfsportart: ' + state.martialArt.label : ''}\n\nWas ich mir wünsche:\n${desc}\n\nErstelle mir einen detaillierten, personalisierten Trainingsplan. Nutze die Methoden von Phil Daru, Mike Dolce, Nick Curson, Bo Sandoval. Erkläre welche Methoden du verwendest. Schreibe den Plan KOMPLETT aus – alle Tage vollständig.`;

  state.history = [{ role: "user", content: contextMsg }];
  state.loading = true;
  showTyping();
  const response = await callGroq(state.history);
  hideTyping();
  state.messages.push({ role: "assistant", content: response });
  state.history.push({ role: "assistant", content: response });
  appendBubble('assistant', response);
  state.loading = false;
  updateSendBtn();
}

function renderQuickPrompts() {
  const prompts = ["Ernährungsplan dazu", "Recovery Protokoll", "Warm-Up Routine", "Mentale Vorbereitung", "Wettkampf-Woche"];
  const qRow = document.getElementById('q-row');
  qRow.innerHTML = prompts.map(p => `<button class="q-btn" onclick="quickSend('${p}')">${p}</button>`).join('');
}

function quickSend(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
  document.getElementById('q-row').style.display = 'none';
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || state.loading) return;
  input.value = '';
  updateSendBtn();
  appendBubble('user', text);
  state.history.push({ role: "user", content: text });
  state.loading = true;
  showTyping();
  const response = await callGroq(state.history);
  hideTyping();
  state.history.push({ role: "assistant", content: response });
  appendBubble('assistant', response);
  state.loading = false;
  updateSendBtn();
}

function updateSendBtn() {
  const btn = document.getElementById('send-btn');
  const val = document.getElementById('chat-input').value.trim();
  btn.disabled = !val || state.loading;
}

document.getElementById('chat-input').addEventListener('input', updateSendBtn);

let typingEl = null;
function showTyping() {
  const area = document.getElementById('chat-area');
  typingEl = document.createElement('div');
  typingEl.className = 'bubble bubble-in';
  typingEl.innerHTML = `<div class="apex-lbl">⚡ APEX</div><div class="typing-row"><span class="tdot" style="animation-delay:0s"></span><span class="tdot" style="animation-delay:0.2s"></span><span class="tdot" style="animation-delay:0.4s"></span></div>`;
  area.appendChild(typingEl);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

function appendBubble(role, content) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'bubble bubble-in' + (role === 'user' ? ' user' : '');
  if (role === 'assistant') {
    div.innerHTML = `<div class="apex-lbl">⚡ APEX</div><div class="md-content">${renderMarkdown(content)}</div>`;
  } else {
    div.innerHTML = `<div class="bubble-txt">${escapeHtml(content)}</div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderMarkdown(text) {
  const lines = text.split('\n');
  let html = '';
  for (const line of lines) {
    if (line.startsWith('## ')) { html += `<div class="md-h2">${escapeHtml(line.slice(3))}</div>`; }
    else if (line.startsWith('### ')) { html += `<div class="md-h3">${escapeHtml(line.slice(4))}</div>`; }
    else if (line.trim() === '---') { html += `<hr class="md-hr" />`; }
    else if (line.startsWith('- ') || line.startsWith('* ')) { html += `<div class="md-bullet"><span class="md-bullet-dot">▸</span><span class="md-bullet-text">${inlineMd(line.slice(2))}</span></div>`; }
    else if (/^\d+\.\s/.test(line)) { const m = line.match(/^(\d+)\.\s+(.*)/); if (m) html += `<div class="md-bullet"><span class="md-bullet-dot" style="min-width:18px;font-size:12px;font-weight:700;">${m[1]}.</span><span class="md-bullet-text">${inlineMd(m[2])}</span></div>`; }
    else if (line.trim() === '') { html += `<div class="md-gap"></div>`; }
    else { html += `<div class="md-p">${inlineMd(line)}</div>`; }
  }
  return html;
}

function inlineMd(text) {
  return escapeHtml(text).replace(/\*\*([^*]+)\*\*/g, '<strong class="md-bold">$1</strong>');
}

async function callGroq(msgs) {
  try {
    const key = window.GROQ_API_KEY || GROQ_KEY;
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 4000,
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...msgs]
      })
    });
    const data = await res.json();
    return data.choices?.[0]?.message?.content || 'Fehler bei der Antwort.';
  } catch (e) {
    return 'Verbindungsfehler. Bitte erneut versuchen.';
  }
}
</script>
